{% extends "base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<section class="login-shell">
  <div class="login-hero">
    <h2>เปลี่ยนรหัสผ่านก่อนใช้งานต่อ</h2>
    <p>กำหนดรหัสผ่านใหม่ให้เป็นไปตามนโยบายความปลอดภัยของระบบ</p>
  </div>
  <section class="card stack">
    <h2>เปลี่ยนรหัสผ่าน</h2>
    <form method="post" action="/me/password" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>รหัสผ่านใหม่<input type="password" name="password" minlength="8" required></label>
      <label>ยืนยันรหัสผ่านใหม่<input type="password" name="password_confirm" minlength="8" required></label>
      <button type="submit">บันทึกรหัสผ่านใหม่</button>
    </form>
  </section>
</section>
{% endblock %}
